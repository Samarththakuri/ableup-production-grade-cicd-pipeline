sonar.projectKey=abelup-testing

# This is the name and version displayed in the SonarQube UI.
sonar.projectName=abelup-testing
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# This property is optional if sonar.modules is set. 
sonar.sources=backend/src,frontend/src

# Exclude test files, node_modules from coverage/analysis
sonar.exclusions=**/node_modules/**, **/*.spec.ts, **/*.test.ts, frontend/dist/**, backend/dist/**

# Coverage reporting (ensure jest/vitest output paths match here if generating lcov)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
