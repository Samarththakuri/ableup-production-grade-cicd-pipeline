apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: abelup-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Samarththakuri/ableup-production-grade-cicd-pipeline.git"
    targetRevision: HEAD
    path: k8s
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
